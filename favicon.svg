<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#201C18"/>
  <!-- Guitar string / fretboard motif -->
  <line x1="4" y1="10" x2="28" y2="10" stroke="#C47A1E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="14" x2="28" y2="14" stroke="#EDE5D8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="4" y1="18" x2="28" y2="18" stroke="#EDE5D8" stroke-width="1" stroke-linecap="round"/>
  <line x1="4" y1="22" x2="28" y2="22" stroke="#EDE5D8" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Fret lines -->
  <line x1="12" y1="7" x2="12" y2="25" stroke="#A09080" stroke-width="0.8"/>
  <line x1="20" y1="7" x2="20" y2="25" stroke="#A09080" stroke-width="0.8"/>
  <!-- Fret dot inlay -->
  <circle cx="16" cy="16" r="1.8" fill="#C47A1E"/>
</svg>
