<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="230" viewBox="0 0 620 230" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <title>Four-line bass tablature arranged from higher-pitched G to lower-pitched E</title>
  <rect x="0" y="0" width="620" height="230" fill="#ffffff"/>
  <text x="310" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">Four-string bass tablature</text>
  <text x="310" y="55" text-anchor="middle" font-size="14" fill="#3a4a5a">Higher pitch</text>
  <line x1="90" y1="75" x2="570" y2="75" stroke="#1a1a1a" stroke-width="2"/><text x="62" y="80" text-anchor="middle" font-size="18" font-style="italic" fill="#1a1a1a">G</text><line x1="90" y1="110" x2="570" y2="110" stroke="#1a1a1a" stroke-width="2"/><text x="62" y="115" text-anchor="middle" font-size="18" font-style="italic" fill="#1a1a1a">D</text><line x1="90" y1="145" x2="570" y2="145" stroke="#1a1a1a" stroke-width="2"/><text x="62" y="150" text-anchor="middle" font-size="18" font-style="italic" fill="#1a1a1a">A</text><line x1="90" y1="180" x2="570" y2="180" stroke="#1a1a1a" stroke-width="2"/><text x="62" y="185" text-anchor="middle" font-size="18" font-style="italic" fill="#1a1a1a">E</text>
  <line x1="90" y1="75" x2="90" y2="180" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="570" y1="75" x2="570" y2="180" stroke="#1a1a1a" stroke-width="3"/>
  <text x="310" y="215" text-anchor="middle" font-size="14" fill="#3a4a5a">Lower pitch</text>
</svg>